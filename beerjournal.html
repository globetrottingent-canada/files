<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beer Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0b07;
    --surface: #1a1409;
    --card: #221c0f;
    --border: #3a2e18;
    --amber: #e8a020;
    --amber-light: #f5c85a;
    --foam: #f8eedb;
    --muted: #7a6a4a;
    --text: #e8dcc8;
    --red: #c04a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0a0703 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 3rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,160,32,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    color: var(--foam);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  header h1 span {
    color: var(--amber);
  }
  .header-sub {
    margin-top: 0.8rem;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  /* STATS HERO */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-block {
    background: var(--surface);
    padding: 1.6rem 1.2rem;
    text-align: center;
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* LAYOUT */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* SECTION HEADERS */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--foam);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CHARTS GRID */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.4rem;
  }
  .chart-title {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  /* BAR CHARTS */
  .bar-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .bar-item {
    display: grid;
    grid-template-columns: 160px 1fr 44px;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.78rem;
  }
  .bar-label { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { background: var(--border); border-radius: 2px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--amber), var(--amber-light)); border-radius: 2px; transition: width 0.6s ease; }
  .bar-count { color: var(--muted); font-size: 0.72rem; text-align: right; }

  /* TIMELINE */
  .timeline-chart { position: relative; height: 120px; }
  .timeline-canvas { width: 100%; height: 100%; }

  /* ABV DISTRIBUTION */
  .abv-chart { position: relative; height: 100px; }

  /* WORLD MAP SUBSTITUTE */
  .country-cloud {
    display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center;
  }
  .country-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.2rem 0.5rem;
    font-size: 0.72rem;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .country-tag:hover { border-color: var(--amber); background: var(--card); }
  .country-tag.active { border-color: var(--amber); background: rgba(232,160,32,0.12); color: var(--amber); }
  .country-count { color: var(--muted); font-size: 0.65rem; }

  /* FILTERS */
  .filters-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    align-items: center;
  }
  .filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .filter-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  input[type="text"], select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.45rem 0.7rem;
    font-size: 0.82rem;
    font-family: inherit;
    border-radius: 2px;
    min-width: 160px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, select:focus { border-color: var(--amber); }
  select option { background: var(--card); }
  .result-count {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.45rem 0.8rem;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 2px;
    font-family: inherit;
    transition: all 0.2s;
    align-self: flex-end;
  }
  .clear-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* TABLE */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  thead {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 0.8rem 1rem;
    text-align: left;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--amber); }
  th .sort-arrow { margin-left: 0.3rem; opacity: 0.4; }
  th.sort-asc .sort-arrow, th.sort-desc .sort-arrow { opacity: 1; color: var(--amber); }
  td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(58,46,24,0.5);
    color: var(--text);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(232,160,32,0.04); }
  .beer-name { font-weight: 500; color: var(--foam); }
  .abv-badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.1rem 0.4rem;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .abv-high { border-color: rgba(232,160,32,0.4); color: var(--amber); }
  .style-tag {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .country-flag { font-size: 0.9rem; }

  /* PAGINATION */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    padding: 1.2rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .page-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.35rem 0.7rem;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 2px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .page-btn:hover, .page-btn.active { border-color: var(--amber); color: var(--amber); }
  .page-info { font-size: 0.78rem; color: var(--muted); padding: 0 0.5rem; }

  /* SORTABLE COLUMN WIDTHS */
  .col-name { width: 26%; }
  .col-brewery { width: 22%; }
  .col-style { width: 22%; }
  .col-abv { width: 8%; }
  .col-country { width: 12%; }
  .col-date { width: 10%; }

  /* ACTIVE FILTER PILL */
  .active-filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(232,160,32,0.12);
    border: 1px solid rgba(232,160,32,0.3);
    color: var(--amber);
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    cursor: pointer;
  }
  .filter-pill:hover { background: rgba(232,160,32,0.2); }

  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Personal Collection</div>
  <h1>The Beer <span>Journal</span></h1>
  <div class="header-sub">Every pour, documented</div>
</header>

<div class="stats-row" id="statsRow"></div>

<div class="main">
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Beers by Year</div>
      <canvas class="timeline-canvas" id="timelineChart" height="130"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">ABV Distribution</div>
      <canvas class="timeline-canvas" id="abvChart" height="130"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top Styles</div>
      <div class="bar-list" id="stylesChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top Breweries</div>
      <div class="bar-list" id="breweriesChart"></div>
    </div>
  </div>

  <div class="chart-card" style="margin-bottom: 1.5rem;">
    <div class="chart-title" style="margin-bottom:0.8rem;">Countries Explored — click to filter</div>
    <div class="country-cloud" id="countryCloud"></div>
  </div>

  <div class="section-title">All Beers</div>

  <div class="filters-bar">
    <div class="filter-group">
      <div class="filter-label">Search</div>
      <input type="text" id="searchInput" placeholder="Beer name, brewery…">
    </div>
    <div class="filter-group">
      <div class="filter-label">Style</div>
      <select id="styleFilter"><option value="">All styles</option></select>
    </div>
    <div class="filter-group">
      <div class="filter-label">Year</div>
      <select id="yearFilter"><option value="">All years</option></select>
    </div>
    <div class="filter-group">
      <div class="filter-label">ABV</div>
      <select id="abvFilter">
        <option value="">Any ABV</option>
        <option value="session">Session (≤ 4.5%)</option>
        <option value="standard">Standard (4.5–6.5%)</option>
        <option value="strong">Strong (6.5–9%)</option>
        <option value="extreme">Extreme (9%+)</option>
      </select>
    </div>
    <button class="clear-btn" onclick="clearFilters()">Clear all</button>
    <div class="result-count" id="resultCount"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-name sort-asc" onclick="sortBy('beer_name')" data-col="beer_name">Beer Name <span class="sort-arrow">↑</span></th>
          <th class="col-brewery" onclick="sortBy('brewery_name')" data-col="brewery_name">Brewery <span class="sort-arrow">↕</span></th>
          <th class="col-style" onclick="sortBy('beer_type')" data-col="beer_type">Style <span class="sort-arrow">↕</span></th>
          <th class="col-abv" onclick="sortBy('beer_abv')" data-col="beer_abv">ABV <span class="sort-arrow">↕</span></th>
          <th class="col-country" onclick="sortBy('brewery_country')" data-col="brewery_country">Country <span class="sort-arrow">↕</span></th>
          <th class="col-date" onclick="sortBy('created_at')" data-col="created_at">Date <span class="sort-arrow">↕</span></th>
        </tr>
      </thead>
      <tbody id="beerTable"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<footer>
  <div id="footerText"></div>
</footer>

Company","beer_type":"Stout - Imperial / Double","beer_abv":"13.5","created_at":"2025-12-23 21:23","brewery_country":"Canada"}]
;

// --- STATE ---
let filtered = [...BEERS];
let sortCol = 'beer_name';
let sortDir = 1;
let currentPage = 1;
const PAGE_SIZE = 50;
let countryFilter = '';

// --- INIT ---
function init() {
  computeStats();
  buildCharts();
  populateFilters();
  buildCountryCloud();
  applyFilters();
  document.getElementById('footerText').textContent = BEERS.length.toLocaleString() + ' beers across ' + new Set(BEERS.map(b=>b.brewery_country)).size + ' countries · Beer Journal';
}

// --- STATS ---
function computeStats() {
  const countries = new Set(BEERS.map(b=>b.brewery_country)).size;
  const styles = new Set(BEERS.map(b=>b.beer_type)).size;
  const breweries = new Set(BEERS.map(b=>b.brewery_name)).size;
  const abvs = BEERS.filter(b=>+b.beer_abv>0).map(b=>+b.beer_abv);
  const avgAbv = (abvs.reduce((a,b)=>a+b,0)/abvs.length).toFixed(1);
  const years = BEERS.map(b=>b.created_at.slice(0,4));
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);

  const stats = [
    { n: BEERS.length.toLocaleString(), l: 'Total Beers' },
    { n: countries, l: 'Countries' },
    { n: breweries.toLocaleString(), l: 'Breweries' },
    { n: styles, l: 'Styles' },
    { n: avgAbv + '%', l: 'Avg ABV' },
    { n: minYear + '–' + maxYear, l: 'Years Active' },
  ];
  document.getElementById('statsRow').innerHTML = stats.map(s =>
    '<div class="stat-block"><div class="stat-number">' + s.n + '</div><div class="stat-label">' + s.l + '</div></div>'
  ).join('');
}

// --- CHARTS ---
function buildCharts() {
  drawTimeline();
  drawABV();
  drawBars('stylesChart', countBy(BEERS, 'beer_type'), 10);
  drawBars('breweriesChart', countBy(BEERS, 'brewery_name'), 10);
}

function countBy(arr, key) {
  const m = {};
  arr.forEach(b => { m[b[key]] = (m[b[key]]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function drawBars(id, data, n) {
  const el = document.getElementById(id);
  const top = data.slice(0,n);
  const max = top[0][1];
  el.innerHTML = top.map(([label,count]) =>
    '<div class="bar-item">' +
      '<div class="bar-label" title="' + label + '">' + label + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + (count/max*100) + '%"></div></div>' +
      '<div class="bar-count">' + count + '</div>' +
    '</div>'
  ).join('');
}

function drawTimeline() {
  const canvas = document.getElementById('timelineChart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;

  const byYear = {};
  BEERS.forEach(b => {
    const y = b.created_at.slice(0,4);
    byYear[y] = (byYear[y]||0)+1;
  });
  const years = Object.keys(byYear).sort();
  const vals = years.map(y => byYear[y]);
  const max = Math.max(...vals);

  const pad = { t: 10, b: 28, l: 8, r: 8 };
  const bw = (W - pad.l - pad.r) / years.length;

  // Bars
  vals.forEach((v, i) => {
    const x = pad.l + i * bw;
    const bh = (v / max) * (H - pad.t - pad.b);
    const y = H - pad.b - bh;
    ctx.fillStyle = 'rgba(232,160,32,0.7)';
    ctx.fillRect(x + 2, y, bw - 4, bh);
  });

  // Labels
  ctx.fillStyle = '#7a6a4a';
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'center';
  years.forEach((yr, i) => {
    const x = pad.l + i * bw + bw/2;
    ctx.fillText(yr, x, H - pad.b + 14);
  });

  // Values on top
  ctx.fillStyle = '#f5c85a';
  ctx.font = '9px Inter, sans-serif';
  vals.forEach((v, i) => {
    const x = pad.l + i * bw + bw/2;
    const bh = (v / max) * (H - pad.t - pad.b);
    const y = H - pad.b - bh - 3;
    if (bw > 24) ctx.fillText(v, x, y);
  });
}

function drawABV() {
  const canvas = document.getElementById('abvChart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;

  const abvs = BEERS.filter(b=>+b.beer_abv>0 && +b.beer_abv<20).map(b=>+b.beer_abv);
  // Bins: 0-2, 2-4, 4-5, 5-6, 6-7, 7-8, 8-9, 9-11, 11-14, 14+
  const bins = [0,2,3,4,5,6,7,8,9,11,14,20];
  const counts = new Array(bins.length-1).fill(0);
  abvs.forEach(a => {
    for(let i=0;i<bins.length-1;i++) {
      if(a>=bins[i] && a<bins[i+1]) { counts[i]++; break; }
    }
  });
  const labels = bins.slice(0,-1).map((b,i)=>b+'-'+bins[i+1]+'%');
  const max = Math.max(...counts);
  const pad = {t:10,b:28,l:8,r:8};
  const bw = (W-pad.l-pad.r)/counts.length;

  counts.forEach((v,i) => {
    const x = pad.l + i*bw;
    const bh = (v/max)*(H-pad.t-pad.b);
    const pct = i/counts.length;
    const r = Math.round(100 + pct*132);
    const g = Math.round(160 - pct*80);
    const b = Math.round(32);
    ctx.fillStyle = 'rgba('+r+','+g+','+b+',0.8)';
    ctx.fillRect(x+2, H-pad.b-bh, bw-4, bh);
  });

  ctx.fillStyle = '#7a6a4a';
  ctx.font = '8px Inter, sans-serif';
  ctx.textAlign = 'center';
  labels.forEach((l,i) => {
    const x = pad.l + i*bw + bw/2;
    ctx.fillText(l, x, H-pad.b+13);
  });
}

// --- COUNTRY CLOUD ---
function buildCountryCloud() {
  const counts = countBy(BEERS, 'brewery_country');
  const max = counts[0][1];
  const el = document.getElementById('countryCloud');
  el.innerHTML = counts.map(([c, n]) => {
    const size = 0.65 + (n/max)*0.55;
    return '<span class="country-tag" onclick="filterCountry(this, '' + c.replace(/'/g,"\'") + '')" style="font-size:' + size + 'rem">' +
      c + ' <span class="country-count">' + n + '</span></span>';
  }).join('');
}

function filterCountry(el, country) {
  if(countryFilter === country) {
    countryFilter = '';
    el.classList.remove('active');
  } else {
    document.querySelectorAll('.country-tag').forEach(t => t.classList.remove('active'));
    countryFilter = country;
    el.classList.add('active');
  }
  currentPage = 1;
  applyFilters();
}

// --- FILTERS ---
function populateFilters() {
  const styles = [...new Set(BEERS.map(b=>b.beer_type))].sort();
  const years = [...new Set(BEERS.map(b=>b.created_at.slice(0,4)))].sort((a,b)=>b-a);
  const sf = document.getElementById('styleFilter');
  const yf = document.getElementById('yearFilter');
  styles.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o); });
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yf.appendChild(o); });

  ['searchInput','styleFilter','yearFilter','abvFilter'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { currentPage = 1; applyFilters(); });
  });
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const style = document.getElementById('styleFilter').value;
  const year = document.getElementById('yearFilter').value;
  const abvRange = document.getElementById('abvFilter').value;

  filtered = BEERS.filter(b => {
    if(q && !b.beer_name.toLowerCase().includes(q) && !b.brewery_name.toLowerCase().includes(q)) return false;
    if(style && b.beer_type !== style) return false;
    if(year && !b.created_at.startsWith(year)) return false;
    if(countryFilter && b.brewery_country !== countryFilter) return false;
    const abv = +b.beer_abv;
    if(abvRange === 'session' && abv > 4.5) return false;
    if(abvRange === 'standard' && (abv <= 4.5 || abv > 6.5)) return false;
    if(abvRange === 'strong' && (abv <= 6.5 || abv > 9)) return false;
    if(abvRange === 'extreme' && abv <= 9) return false;
    return true;
  });

  // Sort
  filtered.sort((a,b) => {
    let va = a[sortCol]||'', vb = b[sortCol]||'';
    if(sortCol==='beer_abv') { va=+va; vb=+vb; }
    if(va<vb) return -sortDir;
    if(va>vb) return sortDir;
    return 0;
  });

  document.getElementById('resultCount').textContent = filtered.length.toLocaleString() + ' beers';
  renderTable();
  renderPagination();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('styleFilter').value = '';
  document.getElementById('yearFilter').value = '';
  document.getElementById('abvFilter').value = '';
  countryFilter = '';
  document.querySelectorAll('.country-tag').forEach(t=>t.classList.remove('active'));
  currentPage = 1;
  applyFilters();
}

// --- SORT ---
function sortBy(col) {
  if(sortCol === col) { sortDir = -sortDir; }
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    th.querySelector('.sort-arrow').textContent = '↕';
  });
  const th = document.querySelector('th[data-col="'+col+'"]');
  if(th) {
    th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    th.querySelector('.sort-arrow').textContent = sortDir===1?'↑':'↓';
  }
  currentPage = 1;
  applyFilters();
}

// --- TABLE RENDER ---
function renderTable() {
  const start = (currentPage-1)*PAGE_SIZE;
  const page = filtered.slice(start, start+PAGE_SIZE);
  const tbody = document.getElementById('beerTable');

  tbody.innerHTML = page.map(b => {
    const abv = +b.beer_abv;
    const abvClass = abv >= 8 ? 'abv-high' : '';
    const abvStr = abv > 0 ? abv.toFixed(1)+'%' : '—';
    const date = b.created_at.slice(0,10);
    return '<tr>' +
      '<td class="beer-name">' + esc(b.beer_name) + '</td>' +
      '<td>' + esc(b.brewery_name) + '</td>' +
      '<td class="style-tag">' + esc(b.beer_type) + '</td>' +
      '<td><span class="abv-badge ' + abvClass + '">' + abvStr + '</span></td>' +
      '<td>' + esc(b.brewery_country) + '</td>' +
      '<td style="color:var(--muted);font-size:0.75rem">' + date + '</td>' +
    '</tr>';
  }).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- PAGINATION ---
function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if(totalPages <= 1) { el.innerHTML=''; return; }

  let html = '';
  html += '<button class="page-btn" onclick="goPage(1)">«</button>';
  html += '<button class="page-btn" onclick="goPage(' + Math.max(1,currentPage-1) + ')">‹</button>';

  const start = Math.max(1, currentPage-2);
  const end = Math.min(totalPages, start+4);
  for(let i=start;i<=end;i++) {
    html += '<button class="page-btn' + (i===currentPage?' active':'') + '" onclick="goPage('+i+')">'+i+'</button>';
  }

  html += '<button class="page-btn" onclick="goPage(' + Math.min(totalPages,currentPage+1) + ')">›</button>';
  html += '<button class="page-btn" onclick="goPage('+totalPages+')">»</button>';
  html += '<span class="page-info">Page ' + currentPage + ' of ' + totalPages + '</span>';
  el.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  renderTable();
  renderPagination();
  document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

init();

</script>
