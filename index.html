<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f14;
    color: #e8eaf0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #f0a500;
    text-shadow: 0 0 40px rgba(240,165,0,0.25);
    margin-bottom: 16px;
  }
  p {
    color: #8892a4;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  a.card {
    display: block;
    width: 280px;
    padding: 18px 28px;
    border: 1px solid #252a35;
    background: #151820;
    color: #e8eaf0;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-left: 4px solid #f0a500;
    transition: background 0.15s, border-color 0.15s;
  }
  a.card:hover {
    background: #1e2232;
    border-left-color: #ffc940;
  }
  a.card span {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #8892a4;
    text-transform: none;
    letter-spacing: 0.05em;
    margin-top: 4px;
    font-weight: 400;
  }
</style>
</head>
<body>
  <h1>My Site</h1>
  <p>More coming soon</p>
  <div class="links">
    <a class="card" href="games.html">
      🏒 Games I've Been To
      <span>A lifetime of live sports — 1988 through 2026</span>
    </a>
  </div>
</body>
</html>
