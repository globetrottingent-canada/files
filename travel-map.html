<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My World Travel Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ocean:    #0d1f2d;
    --bg:       #0a1520;
    --visited:  #e8a045;
    --transit:  #6b8fa3;
    --unvisited:#1e3448;
    --border:   #2a4a62;
    --text:     #c8dde8;
    --accent:   #e8a045;
    --dim:      #4a7a99;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2rem 2.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .title-block h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem;
    font-weight: 300;
    color: #e8f4f8;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .title-block h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .title-block p {
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 0.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .stats {
    display: flex;
    gap: 2rem;
  }

  .stat { text-align: right; }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 500px;
  }

  #map { width: 100%; height: 100%; display: block; }

  .country {
    stroke: #0d1f2d;
    stroke-width: 0.4px;
    transition: opacity 0.15s;
    cursor: default;
  }

  .country.visited  { fill: var(--visited); cursor: pointer; }
  .country.transit  { fill: var(--transit); cursor: pointer; }
  .country.unvisited{ fill: var(--unvisited); }
  .country.visited:hover  { opacity: 0.75; }
  .country.transit:hover  { opacity: 0.75; }

  /* UK overlay paths */
  .uk-nation {
    stroke: #0d1f2d;
    stroke-width: 0.6px;
    fill: var(--visited);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .uk-nation:hover { opacity: 0.75; }

  .graticule { fill: none; stroke: #162b3e; stroke-width: 0.3px; }
  .sphere { fill: #0d1f2d; }

  #tooltip {
    position: absolute;
    background: #0f2336;
    border: 1px solid var(--border);
    padding: 0.5rem 0.9rem;
    font-size: 0.75rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
    z-index: 10;
  }

  #tooltip .tt-name {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 300;
    color: #e8f4f8;
  }

  #tooltip .tt-status {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  #tooltip .tt-status.v { color: var(--accent); }
  #tooltip .tt-status.t { color: var(--transit); }

  .legend {
    padding: 0.8rem 2.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .swatch {
    width: 12px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .swatch.visited   { background: var(--visited); }
  .swatch.transit   { background: var(--transit); }
  .swatch.unvisited { background: var(--unvisited); border: 1px solid var(--border); }

  .panel {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(10,21,32,0.92);
    border: 1px solid var(--border);
    width: 220px;
    max-height: calc(100% - 2rem);
    overflow-y: auto;
    font-size: 0.68rem;
  }

  .panel-header {
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--dim);
    position: sticky;
    top: 0;
    background: rgba(10,21,32,0.98);
    display: flex;
    justify-content: space-between;
  }

  .panel ul { list-style: none; padding: 0.4rem 0; }

  .panel li {
    padding: 0.25rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text);
    line-height: 1.3;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.v { background: var(--visited); }
  .dot.t { background: var(--transit); }

  .panel-section {
    display: block !important;
    padding: 0.4rem 0.9rem 0.2rem !important;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    border-top: 1px solid var(--border);
    margin-top: 0.2rem;
  }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 700px) {
    header { padding: 1.2rem 1.2rem 0.8rem; }
    .title-block h1 { font-size: 1.6rem; }
    .stat-num { font-size: 1.4rem; }
    .panel { display: none; }
    .legend { padding: 0.6rem 1.2rem; gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>The <em>World</em> So Far</h1>
    <p>A personal travel record</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="visited-count">—</div>
      <div class="stat-label">Countries visited</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pct-count">—</div>
      <div class="stat-label">Of the world</div>
    </div>
  </div>
</header>

<div class="map-container">
  <svg id="map"></svg>
  <div id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-status" id="tt-status"></div>
  </div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <span>Countries</span>
      <span id="panel-count"></span>
    </div>
    <ul id="panel-list"></ul>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="swatch visited"></div> Visited</div>
  <div class="legend-item"><div class="swatch transit"></div> In transit</div>
  <div class="legend-item"><div class="swatch unvisited"></div> Not yet</div>
</div>

// ── Visited countries ────────────────────────────────────────────────────────
const visitedNames = new Set([
  "Canada","United States of America","Mexico","Costa Rica","Cuba","Dominican Republic",
  "Saint-Barthélemy","Saint Martin","Sint Maarten","Anguilla",
  "Peru","Bolivia",
  "Sierra Leone","Ghana","Togo","Benin",
  "Japan","Australia",
  "Ireland",
  "Portugal","Spain","France","Belgium","Netherlands","Netherlands, Kingdom of the","Luxembourg",
  "Italy","Greece","Germany","Austria","Switzerland","Liechtenstein",
  "Czechia","Czech Republic","Slovakia","Hungary","Slovenia","Albania","Croatia",
  "Montenegro","Kosovo","North Macedonia","Bosnia and Herzegovina","Serbia","Romania","Bulgaria",
  "Türkiye","Türkiye","Turkey","Moldova","Moldova, Republic of","Ukraine","Russia","Russian Federation",
  "Estonia","Latvia","Lithuania","Poland",
  "Denmark","Norway","Sweden","Finland","Iceland",
  // Vatican handled separately (tiny)
  "Vatican"
]);

const transitNames = new Set(["Panama","Monaco"]);

// Human display list
const visitedList = [
  "Canada","United States","Mexico","Costa Rica","Cuba","Dominican Republic",
  "St Barths","St Martin","Sint Maarten","Anguilla",
  "Peru","Bolivia",
  "Sierra Leone","Ghana","Togo","Benin",
  "Japan","Australia",
  "Ireland","England","Scotland","Wales","Northern Ireland",
  "Portugal","Spain","France","Belgium","Netherlands","Luxembourg",
  "Italy","Vatican City","Greece","Germany","Austria","Switzerland","Liechtenstein",
  "Czech Republic","Slovakia","Hungary","Slovenia","Albania","Croatia",
  "Bosnia","Montenegro","Kosovo","North Macedonia","Serbia","Romania","Bulgaria",
  "Turkey","Moldova","Ukraine","Russia",
  "Estonia","Latvia","Lithuania","Poland",
  "Denmark","Norway","Sweden","Finland","Iceland"
];

const transitList = ["Panama","Monaco"];

// ── Stats ────────────────────────────────────────────────────────────────────
document.getElementById("visited-count").textContent = visitedList.length;
document.getElementById("pct-count").textContent = Math.round(visitedList.length / 195 * 100) + "%";

// ── Sidebar ──────────────────────────────────────────────────────────────────
const ul = document.getElementById("panel-list");
document.getElementById("panel-count").textContent = visitedList.length;

function addSection(label) {
  const li = document.createElement("li");
  li.className = "panel-section";
  li.textContent = label;
  ul.appendChild(li);
}
function addItem(name, cls) {
  const li = document.createElement("li");
  li.innerHTML = `<span class="dot ${cls}"></span>${name}`;
  ul.appendChild(li);
}

addSection(`Visited · ${visitedList.length}`);
visitedList.forEach(c => addItem(c, "v"));
addSection(`In Transit · ${transitList.length}`);
transitList.forEach(c => addItem(c, "t"));

// ── Map ───────────────────────────────────────────────────────────────────────
const svg = d3.select("#map");
const container = document.querySelector(".map-container");

function dims() {
  return [container.clientWidth, container.clientHeight];
}
let [W, H] = dims();
svg.attr("width", W).attr("height", H);

const projection = d3.geoNaturalEarth1()
  .scale(W / 5.8)
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);
const g = svg.append("g");

g.append("path").datum({type:"Sphere"}).attr("class","sphere").attr("d", path);
g.append("path").datum(d3.geoGraticule()()).attr("class","graticule").attr("d", path);

const tooltip = document.getElementById("tooltip");
const ttName  = document.getElementById("tt-name");
const ttStat  = document.getElementById("tt-status");

function showTip(event, name, s) {
  ttName.textContent = name;
  ttStat.textContent = s === "visited" ? "✓ Visited" : "⟳ In transit";
  ttStat.className = "tt-status " + (s === "visited" ? "v" : "t");
  tooltip.style.opacity = 1;
  moveTip(event);
}
function moveTip(event) {
  const rect = container.getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 10;
  if (x + 200 > W) x -= 210;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}
function hideTip() { tooltip.style.opacity = 0; }

// Name normalisation for the numeric-id world atlas
const ISO_NAMES = {};

// Load world atlas + ISO names
Promise.all([
  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(r => r.json()),
  fetch("https://raw.githubusercontent.com/lukes/ISO-3166-Countries-with-Regional-Codes/master/all/all.json").then(r => r.json())
]).then(([world, isoData]) => {
  isoData.forEach(d => { ISO_NAMES[d["country-code"]] = d.name; });

  const countries = topojson.feature(world, world.objects.countries);
  // Debug: log all IDs to find Kosovo/Moldova
  countries.features.forEach(d => {
    const idStr = String(d.id).padStart(3,"0");
    const name = ISO_NAMES[idStr] || ISO_NAMES[d.id] || "";
    if (!name || ['Kosovo','Moldova','Republic of Moldova'].some(n => name.includes(n.split(' ')[0]))) {
      console.log('id:', idStr, 'name:', name || '(no ISO match)');
    }
  });

  // UK ids to suppress (we draw them separately)
  const UK_ID = "826";
  const KOSOVO_IDS = new Set(["383","412","926","008"]);  // 926 = Kosovo in world-atlas

  function getStatus(d) {
    const idStr = String(d.id).padStart(3,"0");
    if (idStr === UK_ID) return "uk";
    if (KOSOVO_IDS.has(idStr)) return "visited";
    const name = ISO_NAMES[idStr] || ISO_NAMES[d.id] || "";
    if (visitedNames.has(name)) return "visited";
    if (transitNames.has(name)) return "transit";
    return "unvisited";
  }

  g.selectAll(".country")
    .data(countries.features)
    .enter().append("path")
    .attr("class", d => {
      const s = getStatus(d);
      if (s === "uk") return "country unvisited";
      return "country " + s;
    })
    .attr("d", path)
    .on("mousemove", function(event, d) {
      const s = getStatus(d);
      if (s === "uk" || s === "unvisited") { hideTip(); return; }
      const name = ISO_NAMES[String(d.id).padStart(3,"0")] || ISO_NAMES[d.id] || "Kosovo";
      showTip(event, name, s);
    })
    .on("mousemove", function(event, d) {
      const s = getStatus(d);
      if (s === "uk" || s === "unvisited") { hideTip(); return; }
      const name = ISO_NAMES[String(d.id).padStart(3,"0")] || ISO_NAMES[d.id] || "Kosovo";
      showTip(event, name, s);
      moveTip(event);
    })
    .on("mouseleave", hideTip);

  // ── UK nations overlay ───────────────────────────────────────────────────
  g.selectAll(".uk-nation")
    .data(UK_NATIONS.features)
    .enter().append("path")
    .attr("class", "uk-nation")
    .attr("d", path)
    .on("mousemove", function(event, d) {
      showTip(event, d.properties.name, "visited");
      moveTip(event);
    })
    .on("mouseleave", hideTip);

}).catch(err => console.error("Map load error:", err));

// ── Zoom & pan ───────────────────────────────────────────────────────────────
const zoom = d3.zoom()
  .scaleExtent([1, 10])
  .on("zoom", e => g.attr("transform", e.transform));

svg.call(zoom);

// ── Responsive ───────────────────────────────────────────────────────────────
window.addEventListener("resize", () => {
  [W, H] = dims();
  svg.attr("width", W).attr("height", H);
  projection.scale(W / 5.8).translate([W / 2, H / 2]);
  g.selectAll("path").attr("d", path);
});
</script>
